# 3gpp-crawler project config for ObsidianDB
# Auto-discovered when running spec-crawler from D:\ObsidianDB (mise-style, highest project precedence)
# No env vars needed — this config is detected automatically.

[path]
# All cache/DB/http-cache live INSIDE ObsidianDB (not ~/.3gpp-crawler)
cache_dir = "D:\\ObsidianDB\\.3gpp-crawler"

[http]
cache_enabled = true
cache_ttl = 7200

[workspace]
profile = "default"
figures = "reference"
tables = "embed"
device = "auto"
